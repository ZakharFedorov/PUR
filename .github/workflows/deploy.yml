name: Deploy Recipe Manager

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build application image
        run: |
          docker build -t recipe-manager-app:latest .

      - name: Pull database image
        run: |
          docker pull postgres:17

      - name: Save Docker images
        run: |
          docker save recipe-manager-app:latest postgres:17 | gzip > recipe-manager-images.tar.gz

      - name: Enable IPv6
        uses: fscarmen/warp-on-actions@v1.1

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Upload Docker images and compose file
        run: |
          scp -6 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            recipe-manager-images.tar.gz debian@[${{ secrets.SERVER_HOST }}]:~/

          ssh -6 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            debian@${{ secrets.SERVER_HOST }} "mkdir -p ~/recipe-manager"

          scp -6 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.yml debian@[${{ secrets.SERVER_HOST }}]:~/recipe-manager/

      - name: Deploy on server
        run: |
          ssh -6 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no debian@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            gunzip -c ~/recipe-manager-images.tar.gz | docker load

            cd ~/recipe-manager

            cat > .env << ENVEOF
            POSTGRES_DB=recipe_manager
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

            SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/recipe_manager
            SPRING_DATASOURCE_USERNAME=postgres
            SPRING_DATASOURCE_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            SPRING_JPA_HIBERNATE_DDL_AUTO=update
            ENVEOF

            docker compose down
            docker compose up -d --no-build

            rm ~/recipe-manager-images.tar.gz
          EOF