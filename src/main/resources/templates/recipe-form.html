<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar('new-recipe')}"></div>

<main class="form-layout">
    <section class="form-card">
        <div class="eyebrow eyebrow-plain">Recipe editor</div>
        <h1 th:text="${recipeId} != null ? 'Edit recipe' : 'Add recipe'"></h1>
        <p>Fill in the recipe title, category, ingredients and instructions.</p>

        <form th:action="@{${formAction}}"
              th:object="${recipeRequest}"
              method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
            <div class="field">
                <label class="field-label">Title</label>
                <label>
                    <input type="text"
                           th:field="*{title}"
                           required
                           minlength="3"
                           maxlength="100"
                           placeholder="Example: Homemade pizza">
                </label>
                <p class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
            </div>

            <div class="field">
                <label class="field-label">Category</label>
                <label>
                    <select th:field="*{category}" required>
                        <option value="">-- Select category --</option>
                        <option th:each="category : ${categories}"
                                th:value="${category}"
                                th:text="${category.displayName}">
                        </option>
                    </select>
                </label>
                <p class="error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></p>
            </div>

            <div class="field">
                <label class="field-label">Ingredients</label>
                <label>
<textarea th:field="*{ingredients}"
          required
          minlength="10"
          maxlength="3000"
          placeholder="Example:
          200 g flour
          2 eggs
          250 ml milk"></textarea>
                </label>
                <p class="error" th:if="${#fields.hasErrors('ingredients')}" th:errors="*{ingredients}"></p>
            </div>

            <div class="field">
                <label class="field-label">Instructions</label>
                <label>
<textarea th:field="*{instructions}"
          required
          minlength="20"
          maxlength="5000"
          placeholder="Example:
            Mix all ingredients together.
            Cook on medium heat for 3 minutes on each side."></textarea>
                </label>
                <p class="error" th:if="${#fields.hasErrors('instructions')}" th:errors="*{instructions}"></p>
            </div>

            <div class="hero-actions">
                <button type="submit">Save recipe</button>
                <a class="btn btn-secondary" href="/my-recipes">Back</a>
            </div>
        </form>
    </section>
</main>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
    lucide.createIcons();
</script>
</body>
</html>
