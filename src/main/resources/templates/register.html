<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | Recipe Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

<main class="auth-shell">

    <section class="auth-side">
        <a href="/register" class="auth-brand">
            <div class="auth-brand-icon">
                <i data-lucide="chef-hat" class="icon"></i>
            </div>
            <div>
                <div class="auth-brand-title">Recipe Manager</div>
                <div class="auth-brand-subtitle">Cookbook</div>
            </div>
        </a>

        <div class="auth-side-content">
            <h1>Start cooking with us.</h1>
            <p>Create your own digital recipe book for free in less than a minute.</p>

            <div class="auth-cooks">
                <div class="cook-avatar">M</div>
                <div class="cook-avatar">P</div>
                <div class="cook-avatar">J</div>
                <span>+ 1 320 other cooks</span>
            </div>
        </div>

        <p class="auth-copyright">© 2026 Recipe Manager</p>
    </section>

    <section class="auth-form-side">
        <div class="auth-form-card">
            <h2>Registration</h2>
            <p class="auth-form-subtitle">Create an account and start building your own recipe collection.</p>

            <p th:if="${error}" th:text="${error}" class="auth-error">
                Registration error
            </p>

            <form th:action="@{/register}"
                  th:object="${registerRequest}"
                  method="post"
                  class="auth-form">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="auth-field">
                    <label for="username">Username</label>
                    <div class="auth-input-wrap">
                        <div class="user-icon">
                            <i data-lucide="user" class="icon"></i>
                        </div>
                        <input id="username"
                               type="text"
                               th:field="*{username}"
                               required
                               minlength="3"
                               maxlength="50"
                               pattern="[A-Za-z0-9_]+"
                               placeholder="marie_n">
                    </div>
                    <p class="auth-error"
                       th:if="${#fields.hasErrors('username')}"
                       th:errors="*{username}">
                    </p>
                </div>

                <div class="auth-field">
                    <label for="email">Email</label>
                    <div class="auth-input-wrap">
                        <span class="auth-input-icon">
                            <i data-lucide="mail" class="icon"></i>
                        </span>
                        <input id="email"
                               type="email"
                               th:field="*{email}"
                               required
                               maxlength="100"
                               placeholder="example@email.com">
                    </div>
                    <p class="auth-error"
                       th:if="${#fields.hasErrors('email')}"
                       th:errors="*{email}">
                    </p>
                </div>

                <div class="auth-field">
                    <label for="password">Password</label>
                    <div class="auth-input-wrap">
                        <span class="auth-input-icon">
                            <i data-lucide="lock" class="icon"></i>
                        </span>
                        <input id="password"
                               type="password"
                               th:field="*{password}"
                               required
                               minlength="4"
                               maxlength="100"
                               placeholder="••••••••">
                    </div>
                    <p class="auth-error"
                       th:if="${#fields.hasErrors('password')}"
                       th:errors="*{password}">
                    </p>
                </div>

                <button type="submit" class="auth-submit">
                    Create account <span>→</span>
                </button>
            </form>

            <p class="auth-switch">
                Already have an account?
                <a href="/login">Login</a>
            </p>
        </div>
    </section>

</main>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
    lucide.createIcons();
</script>
</body>
</html>
